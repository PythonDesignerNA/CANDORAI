kind = "web"
previewPath = "/"
title = "Candor — Recruiter Intelligence"
version = "1.0.0"
id = "artifacts/candor"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22779

[services.development]
run = "pnpm --filter @workspace/candor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/candor", "run", "build" ]
serve = "static"
publicDir = "artifacts/candor/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22779"
BASE_PATH = "/"
